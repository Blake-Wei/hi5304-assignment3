version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspaces/${localWorkspaceFolderBasename}:cached
    command: sleep infinity
    depends_on:
      - db
    ports:
      - "8787:8787"   # RStudio Server
      - "8888:8888"   # Jupyter Lab (optional)

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: hi5304_user
      POSTGRES_PASSWORD: hi5304
      POSTGRES_DB: hi5304
    ports:
      - "5432:5432"
    volumes:
      - hi5304_pgdata:/var/lib/postgresql/data

volumes:
  hi5304_pgdata:









